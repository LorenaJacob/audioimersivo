<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Página 1 e 2 - O xixi que queria um tchau</title>

    <!-- ================================
         CSS GLOBAL (compartilhado)
         ================================= -->
    <link rel="stylesheet" href="../../assets/css/base.css">

    <!-- ================================
         CSS PARA PÁGINAS DE ÁUDIO
         ================================= -->
    <link rel="stylesheet" href="../../assets/css/audio-page.css">

    <!-- ================================
         CSS CUSTOMIZAÇÕES DO LIVRO
         ================================= -->
    <link rel="stylesheet" href="../styles.css">

    <!-- ================================
         Fontes Google
         ================================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>

<body data-page="page-1-2">

    <!-- ============================================================
         CABEÇALHO DO SITE (Desktop + Mobile)
         ============================================================ -->
    <header class="topo-site">

        <!-- Logo -->
        <a href="https://www.instagram.com/lorenajacob.st/">
            <img src="../../assets/img/logo-branca.svg" alt="Logo Lorena Jacob" class="logo-topo">
        </a>

        <!-- Botão hamburguer — apenas mobile -->
        <button class="menu-btn mobile-only">
            <img src="../../assets/img/menu.svg" alt="Menu" class="menu-icone">
        </button>

        <!-- Menu Desktop -->
        <nav class="menu-desktop desktop-only">
            <a href="#" class="item-menu">
                <img src="../../assets/img/icon-livro.svg" class="icon"> COLEÇÃO
            </a>

            <a href="https://www.lorenajacob.com.br/shop" class="item-menu">
                <img src="../../assets/img/icon-loja.svg" class="icon"> LOJA
            </a>

            <a href="https://www.lorenajacob.com.br/" class="item-menu">
                <img src="../../assets/img/icon-site.svg" class="icon"> SITE
            </a>

            <a href="https://api.whatsapp.com/send/?phone=5527998206121" class="btn-contato">
                <img src="../../assets/img/icon-whatsapp.svg" class="icon">
                ENTRE EM CONTATO
            </a>
        </nav>
    </header>

    <!-- ============================================================
         MENU MOBILE (LATERAL DIREITO)
         ============================================================ -->
    <div class="menu-mobile" id="menuMobile">

        <div class="menu-mobile-content">

            <!-- Logo -->
            <img src="../../assets/img/logo-branca.svg" alt="Logo" class="menu-mobile-logo">

            <!-- Itens do menu -->
            <a href="#" class="menu-mobile-item">
                <img src="../../assets/img/icon-livro.svg" class="icon"> COLEÇÃO
            </a>

            <div class="menu-line"></div>

            <a href="https://www.lorenajacob.com.br/shop" class="menu-mobile-item">
                <img src="../../assets/img/icon-loja.svg" class="icon"> LOJA
            </a>

            <div class="menu-line"></div>

            <a href="https://www.lorenajacob.com.br/" class="menu-mobile-item">
                <img src="../../assets/img/icon-site.svg" class="icon"> SITE
            </a>

            <!-- Botão WhatsApp -->
            <a href="https://api.whatsapp.com/send/?phone=5527998206121" class="menu-btn-contato">
                <img src="../../assets/img/icon-whatsapp.svg" class="icon">
                ENTRE EM CONTATO
            </a>

        </div>
    </div>

    <!-- Fundo escuro para fechar o menu -->
    <div id="overlay" class="overlay"></div>

    <!-- ============================================================
         CONTEÚDO PRINCIPAL
         ============================================================ -->
    <main class="container">

        <!-- Título do livro -->
        <img src="../img/titulo.svg" class="titulo" alt="Título do Livro">

        <!-- Indicador da página -->
        <div class="pagina-indicador">
            PÁGINA 01 & 02
        </div>

        <!-- ======================================================
             SEÇÃO DE ÁUDIO
             ====================================================== -->
        <section class="audio-card">

            <!-- CONTROLES DO ÁUDIO (voltar, play/pause, avançar) -->
            <div class="audio-center">

                <!-- Botão Voltar -->
                <div class="audio-nav left" id="btnVoltar">
                    <img src="../../assets/img/voltar.svg" alt="Voltar">
                    <span>Voltar</span>
                </div>

                <!-- Botão Play/Pause -->
                <button class="audio-play" id="btnPlayPause">
                    <img id="playIcon" src="../../assets/img/player.svg" alt="Play">
                    <img id="pauseIcon" src="../../assets/img/pause.svg" style="display:none;" alt="Pause">
                </button>

                <!-- Botão Avançar -->
                <div class="audio-nav right" id="btnAvancar">
                    <img src="../../assets/img/avancar.svg" alt="Avançar">
                    <span>Avançar</span>
                </div>
            </div>

            <!-- Waveform (Wavesurfer renderiza aqui) -->
            <div class="audio-wave-container">
                <span id="currentTime">0:00</span>
                <div id="waveform"></div>
                <span id="totalTime">0:00</span>
            </div>

        </section>

        <!-- Área de ajuda -->
        <div class="area-ajuda">
            <p>Problemas com o áudio?</p>
            <a href="https://wa.me/5527998206121?text=Olá%2C%20estou%20com%20problemas%20no%20áudiobook%20do%20livro%20%22O%20xixi%20que%20queria%20um%20tchau%22">
                <p id="entre-contato"><strong>Entre em contato aqui</strong></p>
            </a>
        </div>

    </main>

    <!-- ============================================================
         RODAPÉ
         ============================================================ -->
    <footer class="rodape">
        <p>©2025 Lorena Jacob • Todos os Direitos Reservados</p>
        <a href="https://www.lorenajacob.com.br/">
            <img src="../../assets/img/logo.svg" class="logo-rodape" alt="Logo Lorena Jacob">
        </a>
    </footer>

    <!-- ============================================================
         SCRIPTS
         ============================================================ -->

    <!-- JS Global (menu, comportamento geral...) -->
    <script src="../../assets/js/base.js"></script>
    <script src="../../assets/js/book-config.js" data-config-path="../config.json"></script>

    <!-- Biblioteca Wavesurfer -->
    <script src="https://unpkg.com/wavesurfer.js"></script>

    <!-- Reprodutor de áudio universal -->
    <script src="../../assets/js/audio-player.js"></script>

</body>
</html>
